<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>TDC環哩匯 x 航空卡消費累哩工具 v12.7.2</title>

  <!-- 外部資源 -->
  <link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Mali:wght@500;700&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* =========================
       排版防禦與基礎樣式
       ========================= */
    :root {
      --bg-main: #fffdf9; --bg-card: #ffffff;
      --primary: #60a5fa; --primary-dark: #2563eb;
      --text-header: #334155; --text-body: #475569; --text-light: #94a3b8;
      --shadow-draw: 3px 3px 0px rgba(0,0,0,0.06);
      --radius-box: 24px;
      --font-hand: 'Mali', cursive; --font-main: 'Varela Round', sans-serif;
      --m-sage: #84a59d; --m-clay: #f5cac3; --m-dusty: #95b8d1; --m-terra: #e5989b; --m-slate: #6d6875;
    }

    body {
      background-color: var(--bg-main); color: var(--text-body); font-family: var(--font-main);
      min-height: 100vh; display: flex; flex-direction: column;
      background-image: radial-gradient(#e0f2fe 2px, transparent 2px); background-size: 24px 24px;
      -webkit-tap-highlight-color: transparent; padding-bottom: 100px; margin: 0;
    }

    h1,h2,h3,h4,h5,h6 { font-family: var(--font-hand); font-weight: 700; color: var(--text-header); margin-top: 0; }

    /* Header & Nav */
    .header {
      background: #ffffff; padding: 15px 20px 25px 20px;
      border-bottom-left-radius: 36px; border-bottom-right-radius: 36px;
      position: sticky; top: 0; box-shadow: var(--shadow-draw); margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center;
      height: 90px; border-bottom: 3px dashed #bae6fd; z-index: 100;
    }
    .header-icon {
      width: 40px; height: 40px; background: #eff6ff; border: 2px solid #bfdbfe;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      color: var(--primary); transform: rotate(-5deg); margin-right: 10px; flex-shrink: 0;
    }
    .header-title h5 { margin: 0; font-size: 1rem; color: var(--primary-dark); line-height: 1.2; }

    .btn-header {
      background: #fff; border: 2px solid #e2e8f0; color: var(--text-body);
      font-weight: 700; font-family: var(--font-hand); font-size: 0.8rem;
      padding: 6px 12px; box-shadow: 2px 2px 0 #e2e8f0; border-radius: 16px;
      cursor: pointer; text-decoration: none; display: flex; align-items: center;
    }

    .container-custom { padding: 10px 16px; max-width: 600px; margin: 0 auto; flex: 1; width: 100%; box-sizing: border-box; }
    .card-box { background: var(--bg-card); border-radius: var(--radius-box); padding: 20px; margin-bottom: 16px; border: 2px solid #f1f5f9; box-shadow: var(--shadow-draw); }
    
    /* Input & Groups */
    .form-label { display: block; font-weight: 700; color: var(--text-header); margin-bottom: 6px; font-size: 0.9rem; font-family: var(--font-hand); }
    .form-control, .form-select { width: 100%; background-color: #fff !important; border: 2px solid #cbd5e1 !important; color: var(--text-header) !important; padding: 10px 14px; border-radius: 16px; font-size: 1rem; font-weight: 600; height: 48px; box-shadow: inset 2px 2px 4px rgba(0,0,0,0.03); }
    
    .input-group { position: relative; display: flex; align-items: stretch; width: 100%; }
    
    /* v12.7 一鍵清除按鈕 */
    .clear-btn {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      width: 24px; height: 24px; background: #e2e8f0; color: #64748b;
      border-radius: 50%; display: none; align-items: center; justify-content: center;
      cursor: pointer; z-index: 10; font-size: 0.8rem; border: none;
    }
    .input-group:focus-within .clear-btn, .input-group:hover .clear-btn { display: flex; }
    
    /* Calculator Page */
    #amount { color: var(--primary) !important; font-size: 1.5rem; letter-spacing: 1px; font-family: var(--font-hand); }
    .input-negative { color: #ef4444 !important; background-color: #fef2f2 !important; border-color: #ef4444 !important; }
    .status-label-negative { color: #ef4444; font-size: 0.8rem; font-weight: 700; margin-top: 4px; font-family: var(--font-hand); display: none; }

    .switch-group { background: #f8fafc; padding: 10px 14px; border-radius: 16px; border: 2px solid #e2e8f0; box-shadow: 2px 2px 0 #e2e8f0; display: flex; align-items: center; justify-content: space-between; cursor: pointer; height: 100%; }
    .form-check-input { width: 2.8em; height: 1.5em; background-color: #cbd5e1; border-radius: 2em; cursor: pointer; appearance: none; position: relative; }
    .form-check-input:checked { background-color: var(--primary); }
    .form-check-input::before { content: ""; position: absolute; width: 1.1em; height: 1.1em; border-radius: 50%; top: 0.1em; left: 0.1em; background-color: white; transition: 0.2s; }
    .form-check-input:checked::before { transform: translateX(1.3em); }

    .btn-action { background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%); color: white; font-weight: 700; border-radius: 50px; padding: 14px; width: 100%; border: 2px solid #bfdbfe; font-size: 1.1rem; font-family: var(--font-hand); box-shadow: 3px 3px 0 rgba(59, 130, 246, 0.25); margin-top: 10px; cursor: pointer; }

    /* Results */
    #result-area { display: none; animation: popUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes popUp { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .plan-card { padding: 16px; border-radius: 18px; margin-top: 12px; border: 2px solid #f1f5f9; position: relative; background: #fff; box-shadow: 2px 2px 0 rgba(0,0,0,0.03); }
    .plan-winner { border-color: var(--primary); background: #f0f9ff; }
    .plan-warning { border-color: #fca5a5 !important; background: #fef2f2 !important; }
    .card-miles { font-size: 1.4rem; color: #34d399; font-weight: 900; font-family: var(--font-hand); }
    .plan-warning .card-miles { color: #f87171; }
    .btn-card-action { border: 1px solid #e2e8f0; background: #fff; color: #64748b; border-radius: 50px; padding: 6px 14px; font-size: 0.8rem; font-weight: 700; font-family: var(--font-hand); cursor: pointer; }
    .btn-card-action.btn-record-win { background: #3b82f6; color: white; border-color: #2563eb; }

    /* Nav Bottom */
    .nav-bottom { position: fixed; bottom: 0; left: 0; width: 100%; background: #ffffff; border-top: 2px solid #e2e8f0; border-top-left-radius: 24px; border-top-right-radius: 24px; display: flex; justify-content: space-evenly; padding: 12px 0 25px 0; z-index: 1000; box-shadow: 0 -4px 20px rgba(0,0,0,0.05); }
    .nav-item { color: var(--text-light); font-size: 0.7rem; font-weight: 700; cursor: pointer; border: none; background: none; display: flex; flex-direction: column; align-items: center; flex: 1; font-family: var(--font-hand); }
    .nav-item.active { color: var(--primary); }
    .nav-badge { position: absolute; top: -5px; right: -8px; background: #ef4444; color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 10px; border: 2px solid #fff; }

    /* v12.7 數據搬家按鈕 */
    .btn-backup { background: #f59e0b; color: white; border: none; border-radius: 16px; padding: 12px; width: 100%; font-family: var(--font-hand); font-weight: 700; margin-bottom: 12px; box-shadow: 2px 2px 0 #b45309; }
    .btn-restore { background: #3b82f6; color: white; border: none; border-radius: 16px; padding: 12px; width: 100%; font-family: var(--font-hand); font-weight: 700; box-shadow: 2px 2px 0 #1e40af; }

    /* Icons */
    .lucide { width: 1.2em; height: 1.2em; display: inline-block; vertical-align: -0.2em; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    
    /* Planner results */
    .planner-result-card { background: #fff; border: 2px solid #e2e8f0; border-radius: 20px; padding: 16px; margin-bottom: 12px; }
    .status-enough { border-color: #10b981; background: #ecfdf5; }
    .status-short { border-color: #f43f5e; background: #fff1f2; }

    /* Modals */
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: none; align-items: center; justify-content: center; }
    .modal.show { display: flex !important; }
    .modal-dialog { background: #fff; width: 90%; max-width: 500px; border-radius: 24px; padding: 24px; position: relative; max-height: 90vh; overflow-y: auto; }
  </style>
</head>

<body>
  <!-- SVG 圖標庫 -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
    <symbol id="icon-plane" viewBox="0 0 24 24"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-.5-.5-2.5 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l6 4-3 3-3-1-2 2 4 4 2-2-1-3 3-3 4 6 1.2-.7c.4-.2.7-.6.6-1.1z"/></symbol>
    <symbol id="icon-calc" viewBox="0 0 24 24"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><path d="M16 10h.01M12 10h.01M8 10h.01M12 14h.01M8 14h.01M12 18h.01M8 18h.01"/></symbol>
    <symbol id="icon-list" viewBox="0 0 24 24"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4M12 16h4M8 11h.01M8 16h.01"/></symbol>
    <symbol id="icon-chart" viewBox="0 0 24 24"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></symbol>
    <symbol id="icon-warehouse" viewBox="0 0 24 24"><path d="M22 8.35V20a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8.35A2 2 0 0 1 3.26 6.5l8-3.2a2 2 0 0 1 1.48 0l8 3.2A2 2 0 0 1 22 8.35Z"/><rect width="12" height="12" x="6" y="10"/></symbol>
    <symbol id="icon-gear" viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></symbol>
    <symbol id="icon-x" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></symbol>

    <symbol id="icon-ticket" viewBox="0 0 24 24"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v2Z"/><path d="M13 5v2M13 17v2M13 11v2"/></symbol>
    <symbol id="icon-copy" viewBox="0 0 24 24"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></symbol>
    <symbol id="icon-rotate" viewBox="0 0 24 24"><path d="M8 3 4 7l4 4M4 7h16M16 21l4-4-4-4M20 17H4"/></symbol>
    <symbol id="icon-swap" viewBox="0 0 24 24"><path d="m7 16 3 3 3-3M10 5v14m7-11-3-3-3 3M14 19V5"/></symbol>

    <symbol id="icon-map" viewBox="0 0 24 24"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></symbol>

    <symbol id="icon-book" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></symbol>
  </svg>

  <!-- Header -->
  <div class="header">
    <div class="d-flex align-items-center">
      <div class="header-icon"><svg class="lucide"><use href="#icon-plane"/></svg></div>
      <div class="header-title">
        <h5>TDC 航空累哩工具<br>v12.7.2</h5>
        <small class="text-secondary fw-bold">旗艦邏輯歸位版</small>
      </div>
    </div>
    <div class="d-flex gap-2">
        <button class="btn-header text-primary" onclick="openGuide()"><svg class="lucide me-1"><use href="#icon-book"/></svg> 教學</button>
        <button class="btn-header" onclick="openSettings()"><svg class="lucide"><use href="#icon-gear"/></svg></button>
    </div>
  </div>

  <div class="container-custom">
    
    <!-- Page 1: Calculator -->
    <div id="page-calc" class="page-section">
      <div class="card-box">
        <div class="row mb-3">
          <div class="col-6">
            <div class="switch-group" onclick="toggleSwitch('birthdayMode')" id="switch-box-birthdayMode">
              <span class="switch-label text-danger fw-bold"><svg class="lucide me-1"><use href="#icon-cake"/></svg>生日月</span>
              <input class="form-check-input" type="checkbox" id="birthdayMode" readonly>
            </div>
          </div>
          <div class="col-6">
            <div class="switch-group" onclick="toggleSwitch('flyMode')" id="switch-box-flyMode">
              <span class="switch-label text-success fw-bold"><svg class="lucide me-1"><use href="#icon-ticket"/></svg>越飛有哩</span>
              <input class="form-check-input" type="checkbox" id="flyMode" readonly>
            </div>
          </div>
        </div>
        
        <div class="mb-3">
          <label class="form-label text-primary">累積目標</label>
          <select id="redemption-target" class="form-select border-primary">
            <option value="ALL">🌏 不指定 (所有航司)</option>
            <option value="AM_BR">🌏 亞萬 / 長榮 (AM / BR)</option>
            <option value="CI">🌸 中華航空 (CI)</option>
          </select>
        </div>

        <div class="row mb-3">
            <div class="col-5">
              <label class="form-label">幣別</label>
              <select id="currency-type" class="form-select" onchange="toggleFxInput(this.value)">
                <option value="TWD">🇹🇼 台幣</option>
                <option value="FOREIGN">🌎 外幣</option>
              </select>
            </div>
            <div class="col-7">
              <label class="form-label">支付方式</label>
              <select id="payment" class="form-select">
                <option value="physical">💳 實體卡</option>
                <option value="online">🌐 線上/網購</option>
                <option value="apple_pay">🍎 Apple Pay</option>
                <option value="line_pay">🟩 LINE Pay</option>
              </select>
            </div>
        </div>

        <div id="fx-input-group" class="mb-3 p-3 bg-light rounded-4" style="display: none; border: 2px dashed #bae6fd;">
            <label class="form-label small text-primary">請輸入匯率 (系統自動加計1.5%)</label>
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0" style="border-radius:16px 0 0 16px;">1 外幣 = </span>
                <input type="number" id="fx-rate-input" class="form-control border-start-0 border-end-0" placeholder="匯率" inputmode="decimal">
                <span class="input-group-text bg-white border-start-0" style="border-radius:0 16px 16px 0;">TWD</span>
            </div>
        </div>

        <div class="mb-3">
          <label class="form-label" id="amount-label">消費金額 (TWD)</label>
          <div class="input-group">
            <button class="btn-outline-secondary px-3" onclick="toggleSign('amount')" style="border-radius: 16px 0 0 16px; border: 2px solid #cbd5e1; border-right:none; font-weight:bold;">退刷</button>
            <input type="number" id="amount" class="form-control" placeholder="0" inputmode="decimal" oninput="checkInputStyle(this)">
            <button class="clear-btn" onclick="clearInput('amount')"><svg class="lucide"><use href="#icon-x"/></svg></button>
          </div>
          <div id="amount-status" class="status-label-negative">⚠️ 修正/退刷模式 (沖帳)</div>
        </div>

        <div class="mb-3">
          <label class="form-label">店家關鍵字 / 備註</label>
          <div class="input-group">
            <input type="text" id="keyword-input" class="form-control" placeholder="例如: 麥當勞, Agoda..." style="font-size:0.9rem;">
            <button class="clear-btn" onclick="clearInput('keyword-input')"><svg class="lucide"><use href="#icon-x"/></svg></button>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">消費類別</label>
          <select id="category" class="form-select">
            <option value="general">🛍️ 一般消費</option>
            <option value="dining">🍽️ 餐廳/外送</option>
            <option value="travel">🏨 旅遊/訂房</option>
            <option value="flight_ci">🌸 華航官網</option>
            <option value="flight_cx">🌲 國泰官網</option>
            <option value="flight_other">✈️ 其他航空</option>
          </select>
        </div>

        <button onclick="calculate()" class="btn-action">開始計算 <svg class="lucide ms-2"><use href="#icon-calc"/></svg></button>
      </div>

      <div id="result-area">
        <div class="nccc-alert d-flex mb-3">
          <svg class="lucide me-2 mt-1 flex-shrink-0 text-warning"><use href="#icon-warn"/></svg>
          <div class="small">連鎖速食、超商、繳費等，高機率屬於「NCCC小額支付」無回饋，請留意。</div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-3 px-1">
          <span class="result-tag" id="scenario-tag">一般消費</span>
          <div class="text-end lh-1" id="fx-info" style="display:none;"></div>
        </div>
        <div id="cards-container"></div>
      </div>
    </div>

    <!-- Page 2: Transaction List -->
    <div id="page-list" class="page-section" style="display:none;">
        <h5 class="text-primary mb-3 d-flex align-items-center px-1"><svg class="lucide me-2"><use href="#icon-list"/></svg>待結算明細</h5>
        <div id="transaction-list-container"></div>
    </div>

    <!-- Page 3: Monitor -->
    <div id="page-status" class="page-section" style="display:none;">
      <div class="card-box">
        <h5 class="mb-3 text-primary d-flex align-items-center"><svg class="lucide me-2"><use href="#icon-chart"/></svg>本期總帳 (Dashboard)</h5>
        <div id="status-container"></div>
        <div class="mt-3 d-flex gap-2">
           <button onclick="clearCurrentStats()" class="btn-light flex-grow-1 border-2 border-secondary" style="border: 2px solid #e2e8f0;">全部重置</button>
           <button onclick="batchImport()" class="btn-action flex-grow-1 mt-0 py-2" style="background:#10b981; border-color:#059669;">一鍵進倉</button>
        </div>
      </div>
      <div class="card-box" style="background:#fffbeb; border-color:#fde68a;">
        <h5 class="mb-3 text-warning d-flex align-items-center" style="color:#b45309;"><svg class="lucide me-2"><use href="#icon-shield"/></svg>上限小管家</h5>
        <div id="limits-container"></div>
      </div>
    </div>

    <!-- Page 4: Warehouse -->
    <div id="page-warehouse" class="page-section" style="display:none;">
        <div class="d-flex mb-3 p-1 bg-light rounded-pill border">
            <button class="flex-grow-1 fw-bold sub-tab-btn border-0 py-2 rounded-pill active" onclick="switchWarehouseTab('manage')" id="tab-btn-manage">資產管理</button>
            <button class="flex-grow-1 fw-bold sub-tab-btn border-0 py-2 rounded-pill" onclick="switchWarehouseTab('planner')" id="tab-btn-planner">兌換試算</button>
        </div>

        <div id="warehouse-view-manage">
            <div class="input-block-card p-3 mb-3 border rounded-4 bg-white shadow-sm">
                <div class="fw-bold text-primary mb-2 d-flex align-items-center"><svg class="lucide me-2"><use href="#icon-plane"/></svg>存入航空哩程</div>

  <script>
    /* =========================
       TDC Miles Tool v12.7.2 正式內核
       ========================= */
    const DB_KEY = 'MILES_APP_V12_6_ISOLATED'; 
    const RULES_KEY = 'MILES_APP_RULES_V12_6';
    let plannerSelectedAssets = new Set();
    let pendingConfirmCallback = null;

    const BUILTIN_DEFS = [
      { id: 'hsbc_live', name: '匯豐 Live+', target: 'AM_BR' },
      { id: 'ctbc_ci_inf', name: '中信 華航璀璨', target: 'CI' },
      { id: 'taishin_cx', name: '台新 國泰世界', target: 'AM_BR' },
      { id: 'hsbc_inf', name: '匯豐 旅人無限', target: 'AM_BR' },
      { id: 'ctbc_ci', name: '中信 華航鼎尊', target: 'CI' }
    ];

    const AUTO_ASSETS = {
        'hsbc_live': { target: '匯豐 Live+ 現金積分', type: 'transfer', unitPoints:1, unitMiles:2 },
        'hsbc_inf': { target: '匯豐 旅人積分', type: 'transfer', unitPoints:1, unitMiles:1 },
        'ctbc_ci': { target: '中華航空 (哩程)', type: 'airline', unitPoints:1, unitMiles:1 },
        'ctbc_ci_inf': { target: '中華航空 (哩程)', type: 'airline', unitPoints:1, unitMiles:1 },
        'taishin_cx': { target: '亞洲萬里通/國泰 (哩程)', type: 'airline', unitPoints:1, unitMiles:1 }
    };

    function loadDB() {
        const raw = localStorage.getItem(DB_KEY);
        if(!raw) return { settings: { enabledBuiltins: ['hsbc_live','taishin_cx','ctbc_ci','hsbc_inf','ctbc_ci_inf'], billingDays: { hsbc:6, ctbc:15, taishin:20, other:1 }, hsbc_autopay: true }, customCards: [], records: {}, limits: {}, warehouse: [] };
        const db = JSON.parse(raw);
        if(!db.records) db.records = {}; if(!db.warehouse) db.warehouse = []; return db;
    }
    function saveDB(data) { localStorage.setItem(DB_KEY, JSON.stringify(data)); }
    function loadRules() { const raw = localStorage.getItem(RULES_KEY); return raw ? JSON.parse(raw) : {}; }
    function saveRules(data) { localStorage.setItem(RULES_KEY, JSON.stringify(data)); }

    // --- 計算引擎與規則 ---
    const CARD_RULES = {
        'ctbc_ci_inf': { name: '中信 華航璀璨', target: 'CI', calc: (ctx) => {
            let div = 20, isBonus = false, note = '一般 20元/哩';
            if(ctx.cat === 'flight_ci' || ctx.isForeign) { div = 10; isBonus = true; note = '指定加碼 10元/哩'; }
            if(ctx.isBirthday && ctx.isForeign && ctx.pay === 'physical') { div = 6.6; isBonus = true; note = '🎂 生日海外實體 6.6元/哩'; }
            return handleCappedMiles(ctx, 'ctbc_ci_inf', 600000, div, 20, isBonus, note);
        }},
        'hsbc_live': { name: '匯豐 Live+', target: 'AM_BR', calc: (ctx) => {
            if(ctx.isEUR) return { miles:0, note: '🚫 歐盟不回饋', consumedQuota:0 };
            let bonus = 0, display = '一般';
            let base = ctx.twdBase * 0.0088;
            if(ctx.isLiveSelect) {
                display = '精選加碼';
                let b = ctx.twdBase * 0.03; if(b > 888) b = 888; bonus += b;
                if(ctx.db.settings.hsbc_autopay) { let a = ctx.twdBase * 0.01; if(a > 200) a = 200; bonus += a; }
            }
            return { miles: Math.trunc(base + bonus) * 2, note: `${display} (1點=2哩)`, consumedQuota: ctx.twdBase };
        }},
        'taishin_cx': { name: '台新 國泰世界', target: 'AM_BR', calc: (ctx) => {
            let baseDiv = ctx.isForeign ? 15 : 22, div = baseDiv, isBonus = false, note = `一般 ${baseDiv}元/哩`;
            if(ctx.cat === 'flight_cx' || (ctx.isFlyMode && ctx.isForeign)) { div = 5; isBonus = true; note = '✈️ 越飛有哩 5元/哩'; }
            return handleCappedMiles(ctx, 'taishin_cx', 1000000, div, baseDiv, isBonus, note);
        }},
        'hsbc_inf': { name: '匯豐 旅人無限', target: 'AM_BR', calc: (ctx) => {
            let div = (ctx.isForeign || ctx.cat.startsWith('flight')) ? 10 : 18;
            return { miles: Math.trunc(ctx.twdBase/div), note: `$${div}元/哩`, consumedQuota: ctx.twdBase };
        }},
        'ctbc_ci': { name: '中信 華航鼎尊', target: 'CI', calc: (ctx) => {
            let div = 18, isBonus = false, note = '一般 18元/哩';
            if(ctx.cat === 'flight_ci' || (ctx.isForeign && ctx.pay !== 'online')) { div = 9; isBonus = true; note = '指定加碼 9元/哩'; }
            if(ctx.isBirthday && ctx.isForeign && ctx.pay === 'physical') { div = 6; isBonus = true; note = '🎂 生日海外 6元/哩'; }
            return handleCappedMiles(ctx, 'ctbc_ci', 1440000, div, 18, isBonus, note);
        }}
    };

    function handleCappedMiles(ctx, id, limit, bonusDiv, baseDiv, isBonus, noteStr) {
        if(!isBonus) return { miles: Math.trunc(ctx.twdBase / baseDiv), note: noteStr, consumedQuota: 0 };
        const used = (ctx.db.limits[`${new Date().getFullYear()}-${id}`]?.spend || 0);
        const remain = Math.max(0, limit - used);
        if(ctx.twdBase <= remain) return { miles: Math.trunc(ctx.twdBase / bonusDiv), note: noteStr, consumedQuota: ctx.twdBase };
        let bonusPortion = Math.trunc(remain / bonusDiv);
        let basePortion = Math.trunc((ctx.twdBase - remain) / baseDiv);
        let warningNote = remain === 0 ? `<span class="text-danger fw-bold">🚫 額度已滿降回 ${baseDiv}/哩</span>` : `<span class="text-danger fw-bold">⚠️ 部分超額 (剩 $${remain.toLocaleString()})</span>`;
        return { miles: bonusPortion + basePortion, note: `${noteStr}<br>${warningNote}`, consumedQuota: remain, isWarning: true };
    }

    // --- UI 控制 ---
    function toggleSwitch(id) { 
        const cb = document.getElementById(id); 
        cb.checked = !cb.checked; 
        document.getElementById(`switch-box-${id}`).classList.toggle('bg-light', !cb.checked);
    }
    function toggleFxInput(val) {
        document.getElementById('fx-input-group').style.display = (val === 'FOREIGN' ? 'block' : 'none');
        document.getElementById('amount-label').innerText = (val === 'FOREIGN' ? '消費金額 (外幣)' : '消費金額 (TWD)');
    }
    function clearInput(id) { document.getElementById(id).value = ''; if(id==='amount') checkInputStyle(document.getElementById(id)); }
    function checkInputStyle(el) { el.classList.toggle('input-negative', parseFloat(el.value) < 0); document.getElementById('amount-status').style.display = (parseFloat(el.value) < 0 ? 'block' : 'none'); }
    function toggleSign(id) { const el = document.getElementById(id); el.value = (parseFloat(el.value)||0) * -1; checkInputStyle(el); }
    
    function switchPage(p, btn) {
        document.querySelectorAll('.page-section').forEach(e => e.style.display='none');
        document.getElementById(`page-${p}`).style.display='block';
        document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
        btn.classList.add('active'); window.scrollTo(0,0);
        if(p==='list') renderList(); if(p==='status') renderStatus(); if(p==='warehouse') renderWarehouse();
    }

    function calculate() {
        const db = loadDB(); const amt = parseFloat(document.getElementById('amount').value);
        if(isNaN(amt) || amt === 0) return showAlert('請輸入金額');
        
        let twdBase = amt;
        if(document.getElementById('currency-type').value === 'FOREIGN') {
            const rate = parseFloat(document.getElementById('fx-rate-input').value);
            if(!rate) return showAlert('請輸入匯率');
            twdBase = Math.round(amt * rate);
        }

        const target = document.getElementById('redemption-target').value;
        const cat = document.getElementById('category').value;
        const kw = document.getElementById('keyword-input').value.toLowerCase();
        
        const ctx = {
            db, twdBase, twdSpend: Math.round(twdBase * 1.015),
            cat, pay: document.getElementById('payment').value,
            isForeign: document.getElementById('currency-type').value === 'FOREIGN',
            isBirthday: document.getElementById('birthdayMode').checked,
            isFlyMode: document.getElementById('flyMode').checked,
            isLiveSelect: ['dining'].includes(cat) || ['餐廳','外送','星巴克','蝦皮','momo'].some(w => kw.includes(w))
        };

        const results = [];
        BUILTIN_DEFS.forEach(def => {
            if(db.settings.enabledBuiltins.includes(def.id)) {
                // 精確過濾：目標不符則不出現
                if(target !== 'ALL' && def.target !== target) return;
                // 優先推薦邏輯：國泰官網強鎖國泰卡
                if(cat === 'flight_cx' && def.id !== 'taishin_cx') return;
                // 華航官網強鎖華航卡
                if(cat === 'flight_ci' && !def.id.includes('ctbc_ci')) return;

                const res = CARD_RULES[def.id].calc(ctx);
                results.push({ id: def.id, ...def, ...res, twdSpend: ctx.twdSpend, twdBase: ctx.twdBase });
            }
        });

        results.sort((a,b) => b.miles - a.miles);
        renderResults(results);
    }

    function renderResults(list) {
        const con = document.getElementById('cards-container'); con.innerHTML = '';
        document.getElementById('result-area').style.display = 'block';
        list.forEach((c, i) => {
            const isWin = i === 0 && !c.isWarning;
            const div = document.createElement('div');
            div.className = `plan-card ${isWin ? 'plan-winner' : ''} ${c.isWarning ? 'plan-warning' : ''}`;
            div.innerHTML = `
                ${isWin ? '<span class="position-absolute badge rounded-pill bg-warning" style="top:-10px; right:10px; color:#334155; border: 2px solid #fff;">WINNER</span>' : ''}
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div class="fw-bold">${c.name}</div>
                        <div class="small text-muted mt-1">${c.note}</div>
                        <button class="btn-card-action mt-2 ${isWin?'btn-record-win':''}" onclick="recordTx(${resultsToIdx(c)})">記帳</button>
                    </div>
                    <div class="text-end">
                        <div class="card-miles">${c.miles.toLocaleString()} <small class="fw-normal" style="font-size:0.6rem">哩</small></div>
                        <div class="small fw-bold text-muted">${(c.twdSpend/c.miles).toFixed(1)} 元/哩</div>
                    </div>
                </div>
            `;
            con.appendChild(div);
        });
        window.tempResults = list;
    }
    function resultsToIdx(c) { return window.tempResults.indexOf(c); }

    function recordTx(idx) {
        const item = window.tempResults[idx]; const db = loadDB();
        const monthKey = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;
        if(!db.records[monthKey]) db.records[monthKey] = {};
        const txId = `tx_${Date.now()}`;
        
        let points = item.miles, unit = '哩';
        if(item.id.includes('hsbc')) { points = Math.trunc(item.miles/2); unit = '積分'; }

        db.records[monthKey][txId] = { ...item, miles: points, unit, note: document.getElementById('keyword-input').value || '一般消費' };
        
        const limitKey = (['taishin_cx','ctbc_ci','ctbc_ci_inf'].includes(item.id)) ? `${new Date().getFullYear()}-${item.id}` : `${monthKey}-${item.id}`;
        if(!db.limits[limitKey]) db.limits[limitKey] = { spend: 0 };
        db.limits[limitKey].spend += (item.consumedQuota || 0);

        saveDB(db); showAlert(`✅ 已記錄！\n${item.name}: ${points} ${unit}`);
        document.getElementById('nav-badge-list').innerText = Object.keys(db.records[monthKey]).length;
        document.getElementById('nav-badge-list').style.display = 'block';
    }

    function renderList() {
        const db = loadDB(); const monthKey = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;
        const data = db.records[monthKey] || {}; const con = document.getElementById('transaction-list-container'); con.innerHTML = '';
        if(Object.keys(data).length === 0) { con.innerHTML = '<div class="py-5 text-center text-muted">目前沒有明細</div>'; return; }
        
        for(let id in data) {
            const r = data[id];
            con.innerHTML += `
                <div class="card-box mb-2 p-3 d-flex justify-content-between align-items-center">
                    <div>
                        <div class="fw-bold">${r.name}</div>
                        <div class="small text-muted">${r.note} ($${r.twdBase.toLocaleString()})</div>
                    </div>
                    <div class="d-flex align-items-center">
                        <div class="text-end me-3"><div class="text-primary fw-bold">+${r.miles} ${r.unit}</div></div>
                        <button class="border-0 bg-transparent text-danger" onclick="delTx('${monthKey}','${id}')"><svg class="lucide"><use href="#icon-trash"/></svg></button>
                    </div>
                </div>
            `;
        }
    }

    function delTx(mKey, txId) {
        showCustomConfirm('確定要刪除這筆紀錄嗎？', () => {
            const db = loadDB(); const r = db.records[mKey][txId];
            const lKey = (['taishin_cx','ctbc_ci','ctbc_ci_inf'].includes(r.id)) ? `${new Date().getFullYear()}-${r.id}` : `${mKey}-${r.id}`;
            if(db.limits[lKey]) db.limits[lKey].spend -= (r.consumedQuota || 0);
            delete db.records[mKey][txId]; saveDB(db); renderList();
        });
    }

    function renderStatus() {
        const db = loadDB(); const monthKey = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;
        const statusCon = document.getElementById('status-container'); statusCon.innerHTML = '';
        const limitsCon = document.getElementById('limits-container'); limitsCon.innerHTML = '';
        
        const recs = db.records[monthKey] || {};
        const agg = {};
        for(let k in recs) { const r = recs[k]; if(!agg[r.id]) agg[r.id]={name:r.name, m:0, u:r.unit}; agg[r.id].m+=r.miles; }
        for(let id in agg) {
            statusCon.innerHTML += `<div class="d-flex justify-content-between mb-2"><span>${agg[id].name}</span><span class="fw-bold text-primary">${agg[id].m} ${agg[id].u}</span></div>`;
        }

        const cards = [
            {id:'hsbc_live', name:'匯豐 Live+', limit: 29600},
            {id:'ctbc_ci_inf', name:'中信 華航璀璨', limit: 600000},
            {id:'taishin_cx', name:'台新 國泰世界', limit: 1000000},
            {id:'ctbc_ci', name:'中信 華航鼎尊', limit: 1440000}
        ];
        cards.forEach(c => {
            const lKey = (['taishin_cx','ctbc_ci','ctbc_ci_inf'].includes(c.id)) ? `${new Date().getFullYear()}-${c.id}` : `${monthKey}-${c.id}`;
            const cur = db.limits[lKey]?.spend || 0;
            const pct = Math.min(100, (cur/c.limit)*100);
            limitsCon.innerHTML += `
                <div class="mb-3">
                    <div class="d-flex justify-content-between small mb-1"><span>${c.name}</span><span>$${cur.toLocaleString()} / $${c.limit.toLocaleString()}</span></div>
                    <div class="progress" style="height:8px;"><div class="progress-bar ${pct>80?'bg-warning':'bg-success'}" style="width:${pct}%"></div></div>
                </div>
            `;
        });
    }

    function batchImport() {
        showCustomConfirm('確定將明細一鍵入庫？', () => {
            const db = loadDB(); const mKey = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;
            const data = db.records[mKey]; if(!data) return;
            for(let k in data) {
                const r = data[k]; const rule = AUTO_ASSETS[r.id];
                if(rule) {
                    let asset = db.warehouse.find(a => a.targetAirline === rule.target);
                    if(!asset) { asset = { type: rule.type, targetAirline: rule.target, name: rule.target, current: 0, unitPoints:rule.unitPoints, unitMiles:rule.unitMiles }; db.warehouse.push(asset); }
                    asset.current += r.miles;
                }
            }
            db.records[mKey] = {}; saveDB(db); renderStatus(); showAlert('✅ 已全部存入倉庫！');
        });
    }

    function clearCurrentStats() { showCustomConfirm('確定重置本月數據與額度嗎？', () => { const db = loadDB(); const mKey = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`; db.records[mKey] = {}; saveDB(db); renderStatus(); }); }

    // --- 搬家功能 (v12.7.2) ---
    function exportDataMagic() {
        const db = loadDB(); const rules = loadRules();
        const pack = { db, rules, v: '12.7.2', ts: Date.now() };
        const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(pack))));
        navigator.clipboard.writeText(b64).then(() => showAlert('✅ 資料已封裝並複製！\n請去 LINE 貼上傳給自己。'));
    }
    function importDataMagic() {
        showCustomConfirm('⚠️ 此動作將覆蓋手機內的「所有資料」，確定還原嗎？', () => {
            navigator.clipboard.readText().then(text => {
                try {
                    const pack = JSON.parse(decodeURIComponent(escape(atob(text.trim()))));
                    if(pack.db && pack.v) {
                        localStorage.setItem(DB_KEY, JSON.stringify(pack.db));
                        localStorage.setItem(RULES_KEY, JSON.stringify(pack.rules || {}));
                        showAlert('🎉 搬家成功！重新整理中...');
                        setTimeout(() => location.reload(), 1500);
                    }
                } catch(e) { showAlert('❌ 格式錯誤！請確認複製了正確的代碼。'); }
            });
        });
    }

    // --- 倉庫與試算 ---
    function addNativeAsset() {
        const name = document.getElementById('native-airline-name').value;
        const val = parseFloat(document.getElementById('native-current').value);
        if(!name || isNaN(val)) return showAlert('請輸入完整資訊');
        const db = loadDB(); db.warehouse.push({ type:'airline', targetAirline: name, name: name, current: val, unitPoints:1, unitMiles:1 });
        saveDB(db); renderWarehouse(); clearInput('native-airline-name'); clearInput('native-current');
    }
    function addTransferAsset() {
        const src = document.getElementById('trans-source-name').value;
        const val = parseFloat(document.getElementById('trans-current').value);
        const target = document.getElementById('trans-target-airline').value;
        const up = parseFloat(document.getElementById('trans-unit-points').value);
        const um = parseFloat(document.getElementById('trans-unit-miles').value);
        if(!src || !target || isNaN(val) || isNaN(up) || isNaN(um)) return showAlert('請輸入完整資訊');
        const db = loadDB(); db.warehouse.push({ type:'transfer', targetAirline: target, name: src, current: val, unitPoints: up, unitMiles: um });
        saveDB(db); renderWarehouse();
    }
    function renderWarehouse() {
        const db = loadDB(); const con = document.getElementById('warehouse-list'); con.innerHTML = '';
        db.warehouse.forEach((item, idx) => {
            const equiv = Math.floor(item.current * (item.unitMiles / item.unitPoints));
            con.innerHTML += `
                <div class="card-box mb-2 d-flex justify-content-between align-items-center">
                    <div><div class="fw-bold">${item.name} (${item.targetAirline})</div><div class="small text-muted">${item.current.toLocaleString()} -> 估 ${equiv.toLocaleString()} 哩</div></div>
                    <button class="border-0 bg-transparent text-danger" onclick="delAsset(${idx})"><svg class="lucide"><use href="#icon-trash"/></svg></button>
                </div>
            `;
        });
    }
    function delAsset(idx) { const db = loadDB(); db.warehouse.splice(idx,1); saveDB(db); renderWarehouse(); }

    function runPlannerCalc() {
        const from = document.getElementById('planner-from').value;
        const to = document.getElementById('planner-to').value;
        const cls = document.getElementById('planner-class').value;
        const isRT = document.getElementById('planner-trip-type').checked;
        const con = document.getElementById('planner-results-container'); con.innerHTML = '';
        
        // 簡易矩陣模擬 (實際應對應 v12.6 之完整矩陣)
        const req = (from==='TW' && to==='NE_ASIA') ? { CI:35000, BR:35000, CX:20000 } : { CI:110000, BR:100000, CX:84000 };
        const b64s = { CI: 'aHR0cHM6Ly93d3cuY2hpbmEtYWlybGluZXMuY29tL3R3L3poL21lbWJlci9yZWRlZW0tYWlybGluZS1taWxlcy9yZXdhcmQtdGlja2V0', BR: 'aHR0cHM6Ly93d3cuZXZhYWlyLmNvbS8=', CX: 'aHR0cHM6Ly93d3cuY2F0aGF5cGFjaWZpYy5jb20v' };

        for(let airline in req) {
            let miles = isRT ? req[airline] : req[airline]/2;
            con.innerHTML += `
                <div class="planner-result-card">
                    <div class="d-flex justify-content-between">
                        <div class="fw-bold">${airline} 兌換預估</div>
                        <div class="fw-bold text-primary">${miles.toLocaleString()} 哩</div>
                    </div>
                    <button class="btn-action mt-2 py-1 fs-6" onclick="window.open(atob('${b64s[airline]}'))">立即兌換 <svg class="lucide"><use href="#icon-external"/></svg></button>
                </div>
            `;
        }
    }

    function togglePlannerTrip() { const cb = document.getElementById('planner-trip-type'); cb.checked = !cb.checked; document.getElementById('trip-label').innerText = cb.checked ? '來回' : '單程'; runPlannerCalc(); }

    // --- 初始化 ---
    function openSettings() { renderSettings(); showModal('settingsModal'); }
    function renderSettings() {
        const db = loadDB(); document.getElementById('setting-hsbc-autopay').checked = db.settings.hsbc_autopay;
        const con = document.getElementById('builtin-cards-list'); con.innerHTML = '';
        BUILTIN_DEFS.forEach(d => {
            const isOn = db.settings.enabledBuiltins.includes(d.id);
            con.innerHTML += `<div class="switch-group mb-2"><span>${d.name}</span><input class="form-check-input" type="checkbox" ${isOn?'checked':''} onchange="toggleBuiltin('${d.id}')"></div>`;
        });
    }
    function toggleBuiltin(id) { const db = loadDB(); const i = db.settings.enabledBuiltins.indexOf(id); if(i>=0) db.settings.enabledBuiltins.splice(i,1); else db.settings.enabledBuiltins.push(id); saveDB(db); }
    function updateGlobalSetting(k, v) { const db = loadDB(); db.settings[k]=v; saveDB(db); }

    function showModal(id) { document.getElementById(id).classList.add('show'); }
    function hideModal(id) { document.getElementById(id).classList.remove('show'); }
    function showAlert(msg) { document.getElementById('alert-msg').innerText = msg; showModal('customAlertModal'); }
    function showCustomConfirm(msg, cb) { document.getElementById('confirm-msg').innerText = msg; pendingConfirmCallback = cb; showModal('customConfirmModal'); }
    document.getElementById('confirm-btn-yes').onclick = () => { hideModal('customConfirmModal'); if(pendingConfirmCallback) pendingConfirmCallback(); };

    function openGuide() {
        const content = `
        <div class="card-box bg-primary text-white p-4"><h5>v12.7.2 教學</h5><p class="small">數據搬家已移至設定齒輪內，一鍵複製代碼至 LINE 貼上即可。輸入框右側「X」可快速清空。</p></div>
        `;
        document.getElementById('guide-content').innerHTML = content; showModal('guideModal');
    }
    
    function switchWarehouseTab(v) { 
      document.querySelectorAll('.sub-tab-btn').forEach(b=>b.classList.remove('active')); 
      document.getElementById('tab-btn-'+v).classList.add('active'); 
      document.getElementById('warehouse-view-manage').style.display = (v==='manage'?'block':'none');
      document.getElementById('warehouse-view-planner').style.display = (v==='planner'?'block':'none');
      if(v==='planner') runPlannerCalc();
    }

    window.onload = () => { 
        toggleFxInput('TWD'); 
        const db = loadDB();
        const mKey = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;
        const count = db.records[mKey] ? Object.keys(db.records[mKey]).length : 0;
        document.getElementById('nav-badge-list').innerText = count;
        if(count > 0) document.getElementById('nav-badge-list').style.display = 'block';
    };
  </script>
</body>
</html>
